<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catwalk Showdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- HEADER -->
        <header>
            <h1>✨ Catwalk Showdown ✨</h1>
            <p>Customize your avatar, style your look, and walk the runway!</p>
        </header>

        <!-- STEP 1: CHARACTER CREATOR -->
        <div id="creator-stage">
            <h2>Step 1: Create Your Model</h2>
            <div class="creator-layout">
                <!-- Preview Canvas -->
                <div class="preview-box">
                    <div class="canvas-container">
                        <div id="preview-base" class="layer base-model">🧍‍♀️</div>
                        <div id="preview-hair" class="layer hair-layer">💇‍♀️</div>
                        <div id="preview-eyes" class="layer eye-layer">👀</div>
                    </div>
                </div>

                <!-- Customization Panel -->
                <div class="custom-panel">
                    <div class="option-group">
                        <label>Body Type</label>
                        <div class="btn-row">
                            <button class="choice-btn active" onclick="setBody('female')">Female</button>
                            <button class="choice-btn" onclick="setBody('male')">Male</button>
                        </div>
                    </div>

                    <div class="option-group">
                        <label>Skin Tone</label>
                        <div class="btn-row" id="skin-tones">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="option-group">
                        <label>Hair Style</label>
                        <div class="btn-row" id="hair-styles">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="option-group">
                        <label>Hair Color</label>
                        <div class="btn-row" id="hair-colors">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <div class="option-group">
                        <label>Eye Color</label>
                        <div class="btn-row" id="eye-colors">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <button id="btn-to-wardrobe" onclick="goToWardrobe()">Next: Pick Clothes 👗</button>
                </div>
            </div>
        </div>

        <!-- STEP 2: MAIN DRESS-UP STAGE (Initially Hidden) -->
        <div id="main-stage" class="hidden">
            <!-- LEFT: THE MODEL CANVAS -->
            <div id="model-zone">
                <div class="canvas-container">
                    <div id="char-base" class="layer base-model">🧍‍♀️</div>
                    <div id="char-hair" class="layer hair-layer">💇‍♀️</div>
                    <div id="char-eyes" class="layer eye-layer">👀</div>
                    
                    <!-- Clothing Layers -->
                    <div id="layer-hat" class="layer accessory-layer"></div>
                    <div id="layer-glasses" class="layer accessory-layer"></div>
                    <div id="layer-tie" class="layer accessory-layer"></div>
                    <div id="layer-scarf" class="layer accessory-layer"></div>
                    <div id="layer-bow" class="layer accessory-layer"></div>
                    <div id="layer-torso" class="layer clothing-layer"></div>
                    <div id="layer-legs" class="layer clothing-layer"></div>
                    <div id="layer-shoes" class="layer clothing-layer"></div>
                </div>
                
                <button id="btn-runway" onclick="startCatwalk()">🚀 Walk the Catwalk! 🚀</button>
            </div>

            <!-- RIGHT: WARDROBE CLOSET -->
            <div id="wardrobe-zone">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('tops')">Tops/Dresses</button>
                    <button class="tab-btn" onclick="switchTab('bottoms')">Bottoms</button>
                    <button class="tab-btn" onclick="switchTab('shoes')">Shoes</button>
                    <button class="tab-btn" onclick="switchTab('accessories')">Accessories</button>
                </div>

                <div id="closet-items" class="items-grid"></div>
            </div>
        </div>

        <!-- STEP 3: RUNWAY ANIMATION & JUDGES -->
        <div id="runway-screen" class="hidden">
            <div class="runway-track">
                <!-- Wrapper to animate custom model entirely -->
                <div id="runway-model-wrapper">
                    <div id="runway-base" class="layer base-model">🧍‍♀️</div>
                    <div id="runway-hair" class="layer hair-layer">💇‍♀️</div>
                    <div id="runway-eyes" class="layer eye-layer">👀</div>
                    <div id="r-layer-hat" class="layer accessory-layer"></div>
                    <div id="r-layer-glasses" class="layer accessory-layer"></div>
                    <div id="r-layer-scarf" class="layer accessory-layer"></div>
                    <div id="r-layer-tie" class="layer accessory-layer"></div>
                    <div id="r-layer-bow" class="layer accessory-layer"></div>
                    <div id="r-layer-torso" class="layer clothing-layer"></div>
                    <div id="r-layer-legs" class="layer clothing-layer"></div>
                    <div id="r-layer-shoes" class="layer clothing-layer"></div>
                </div>
            </div>
            
            <div id="judges-panel" class="hidden">
                <h2>The Judges' Verdict</h2>
                <div class="judges-container">
                    <div class="judge-card" id="judge-1">
                        <div class="avatar">🧐</div>
                        <h3>Pierre (Color)</h3>
                        <p class="score">-</p>
                        <p class="feedback">Waiting...</p>
                    </div>
                    <div class="judge-card" id="judge-2">
                        <div class="avatar">😎</div>
                        <h3>Zoe (Style)</h3>
                        <p class="score">-</p>
                        <p class="feedback">Waiting...</p>
                    </div>
                    <div class="judge-card" id="judge-3">
                        <div class="avatar">👑</div>
                        <h3>Coco (Accessories)</h3>
                        <p class="score">-</p>
                        <p class="feedback">Waiting...</p>
                    </div>
                </div>
                <button id="btn-reset" onclick="resetGame()">Design Another Look</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
